# CI gates main on push/PR. Golden/ingest stay local (`make golden`, `make ingest`) —
# they download the ~1.3GB BGE embedding model and need a seeded DB, which makes
# CI slow and flaky. No OPENROUTER_API_KEY is ever injected here; llm-marked tests
# are excluded and the workflow asserts the key stays unset.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: oce
          POSTGRES_PASSWORD: oce
          POSTGRES_DB: oce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oce -d oce"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://oce:oce@localhost:5432/oce
      REASONING_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (CPU torch first — matches Dockerfile layer order)
        run: |
          pip install --retries 5 --timeout 120 \
            torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e "./backend[dev]"

      - name: Alembic upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Ruff
        working-directory: backend
        run: ruff check .

      # post-hackathon debt: ~60 pre-existing errors in frozen substrate files — do not fix during freeze
      - name: Mypy
        continue-on-error: true
        working-directory: backend
        run: mypy app

      - name: Pytest (no slow / destructive / llm)
        working-directory: backend
        run: |
          test -z "${OPENROUTER_API_KEY:-}"
          pytest -m "not slow and not destructive and not llm" -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
