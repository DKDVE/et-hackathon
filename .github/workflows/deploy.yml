# CD — Azure Container Apps + Static Web App (M15A / D-026)
# Runs after CI passes on main. OIDC login — no Azure client secrets in GitHub.
# Only GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN (SWA deployment token).

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-oce-hackathon
  AZURE_ACR_NAME: ocehackathonacr
  AZURE_BACKEND_APP: oce-backend
  AZURE_SWA_NAME: oce-frontend

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ env.AZURE_ACR_NAME }}"

      - name: Resolve backend FQDN
        id: aca
        run: |
          if ! az containerapp show \
            --name "${{ env.AZURE_BACKEND_APP }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" &>/dev/null; then
            echo "::error::Container App ${{ env.AZURE_BACKEND_APP }} missing — run infra/azure/deploy.sh SKIP_BUILD=1 first"
            exit 1
          fi
          FQDN="$(az containerapp show \
            --name "${{ env.AZURE_BACKEND_APP }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/oce-backend:${{ env.DEPLOY_SHA }}
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/oce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Container App
        run: |
          IDENTITY_ID="$(az identity show \
            -g "${{ env.AZURE_RESOURCE_GROUP }}" -n oce-aca-identity --query id -o tsv)"
          az containerapp update \
            --name "${{ env.AZURE_BACKEND_APP }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.AZURE_ACR_NAME }}.azurecr.io/oce-backend:${{ env.DEPLOY_SHA }}" \
            --registry-server "${{ env.AZURE_ACR_NAME }}.azurecr.io" \
            --registry-identity "${IDENTITY_ID}" \
            --set-env-vars "GIT_REF=${{ env.DEPLOY_SHA }}" \
            --target-port 8000

      - name: Ensure seed job exists
        run: |
          IMAGE="${{ env.AZURE_ACR_NAME }}.azurecr.io/oce-backend:${{ env.DEPLOY_SHA }}"
          IDENTITY_ID="$(az identity show \
            -g "${{ env.AZURE_RESOURCE_GROUP }}" -n oce-aca-identity --query id -o tsv)"
          if az containerapp job show -g "${{ env.AZURE_RESOURCE_GROUP }}" -n oce-seed &>/dev/null; then
            az containerapp job update -g "${{ env.AZURE_RESOURCE_GROUP }}" -n oce-seed --image "$IMAGE"
          else
            az containerapp job create \
              -g "${{ env.AZURE_RESOURCE_GROUP }}" -n oce-seed \
              --environment oce-env \
              --trigger-type Manual \
              --replica-timeout 3600 --replica-retry-limit 1 \
              --parallelism 1 --replica-completion-count 1 \
              --image "$IMAGE" \
              --registry-server "${{ env.AZURE_ACR_NAME }}.azurecr.io" \
              --registry-identity "$IDENTITY_ID" \
              --cpu 2 --memory 4Gi \
              --command "python" "/scripts/seed.py" "--phase" "structure"
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://${{ steps.aca.outputs.fqdn }}
        run: |
          npm ci
          npm run build

      - name: Deploy Static Web App
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true
