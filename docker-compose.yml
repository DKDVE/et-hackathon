services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: oce
      POSTGRES_PASSWORD: oce
      POSTGRES_DB: oce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oce -d oce"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      # dataset design + rendered artifacts (seed/tests read these, M3 too)
      - ./dataset:/dataset
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  seed:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
      - ./dataset:/dataset
    command: python /scripts/seed.py --phase structure
    profiles: []

volumes:
  pgdata:
  frontend_node_modules:
