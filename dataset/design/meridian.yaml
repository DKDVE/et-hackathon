# -----------------------------------------------------------------------------
# PHRASE BANK — technician voices (D-008: inconsistency is load-bearing).
# Five authorial voices, deliberately inconsistent register / spelling:
#   v1 Ravi   — terse, lowercase, abbreviations, temps in C
#   v2 Sunil  — verbose, complete sentences, semi-formal
#   v3 Imran  — abbreviation-heavy, apostrophes, telegraphic
#   v4 Deepak — misspelled, run-on, little punctuation
#   v5 Meena  — structured checklist style, semi-terse
# render_wo.py picks phrasings deterministically and rotates voices so any 20
# raw descriptions expose several distinct voices and genuinely messy entries.
# Every phrase here is authored (P10) — the generator never invents wording.
# -----------------------------------------------------------------------------
