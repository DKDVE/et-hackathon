# -----------------------------------------------------------------------------
# OPERATIONAL HISTORY NOTES — rendered into inspection / incident reports.
# The flush-plan deviation thread lives here: it is the cross-source evidence
# that makes "check seal flush plan against OEM spec" the recommended action,
# independently corroborated by the manual's troubleshooting table.
# kind: inspection | incident. owner_tag ties the report to a hero asset.
# -----------------------------------------------------------------------------
operational_history_notes:
  - id: OHN-01
    owner_tag: P-3401
    kind: inspection
    date: 2021-08-12
    title: Seal flush line inspection after blockage (P-3401)
    body: >-
      Following WO-2021-0453 the API Plan 11 flush line on P-3401 was found
      partially choked at the orifice. Line and strainer cleaned. The flush
      arrangement in service could not be confirmed against the OEM-specified
      Plan 11; recommend verifying the seal flush plan against the Rheinwerk
      MSC-CP200 manual and standardising across all four sister pumps.
  - id: OHN-02
    owner_tag: P-3105
    kind: inspection
    date: 2023-09-15
    title: Seal flush deviation noted (P-3105)
    body: >-
      During WO-2023-0518 the seal flush on P-3105 was found running a
      non-standard "Plan Y" arrangement with low flush pressure, not the
      OEM-specified Plan 11. Flush restored. This is the second sister pump on
      which a flush-plan deviation has been recorded; a fleet-wide review of the
      CP200 seal flush plan against OEM spec is recommended.
  - id: OHN-03
    owner_tag: P-3401
    kind: incident
    date: 2024-03-05
    title: Mechanical seal failure and product release (P-3401)
    body: >-
      P-3401 mechanical seal failed with product weeping at the gland and
      dripping on the outboard side (WO-2024-0117), 14 h downtime. Cartridge
      seal replaced. Seal faces showed thermal distress consistent with
      inadequate flush. The flush-plan deviation flagged in 2021 remains open;
      correcting the seal flush plan to OEM spec is the standing recommendation.
  - id: OHN-04
    owner_tag: P-3105
    kind: incident
    date: 2025-06-11
    title: Mechanical seal failure, faces scored (P-3105)
    body: >-
      P-3105 mechanical seal failed with leakage at the gland follower and
      product on the baseplate; seal faces found scored (WO-2025-0289), 16 h
      downtime. Same failure signature as P-3401 in 2024. Flush plan again
      suspected off-spec. Third seal-flush concern across the sister set.
  - id: OHN-05
    owner_tag: P-3402
    kind: incident
    date: 2026-01-16
    title: Mechanical seal failure, flush plan confirmed off-spec (P-3402)
    body: >-
      P-3402 mechanical seal failed (WO-2026-0034), 11 h downtime. On strip-down
      the seal flush was confirmed running Plan Y, NOT the OEM-specified Plan 11.
      This is the third mechanical-seal failure across the CP200 sisters in 22
      months (P-3401 2024, P-3105 2025, P-3402 2026), cumulative 41 h downtime.
      Root cause tied to the long-standing flush-plan deviation. Action: bring
      all four CP200 seal flush plans to OEM Plan 11 per the MSC-CP200 manual.
  - id: OHN-06
    owner_tag: P-2210
    kind: incident
    date: 2024-07-21
    title: High vibration corrected by alignment (P-2210)
    body: >-
      P-2210 tripped on high drive-end vibration (WO-2024-0662). Laser alignment
      found the coupling out by 0.4 mm; corrected with shims. This is a
      misalignment event, NOT a seal failure — distinct from the mechanical-seal
      pattern on the other three sisters.
  - id: OHN-07
    owner_tag: P-3401
    kind: inspection
    date: 2022-02-10
    title: Annual condition inspection (P-3401)
    body: >-
      Routine annual inspection of P-3401. Vibration and bearing temperatures
      within limits. Seal flush flow adequate at time of check. General
      condition satisfactory; continue monitoring flush arrangement.

# -----------------------------------------------------------------------------
# DOCUMENTS — authored content blocks (P10: the generator formats, never authors).
# The manual is the Tier-1 OEM manual for the hero CP200 class. Section headings
# are clear and numbered so the M3 structure-aware chunker can split on them.
# -----------------------------------------------------------------------------
documents:
  manual:
    owner_class: CP200
    title: >-
      Rheinwerk MSC-CP200 Centrifugal Process Pump — Operation & Maintenance Manual
    doc_no: RW-CP200-OM-Rev4
    intro: >-
      This manual covers the installation, operation and maintenance of the
      Rheinwerk MSC-CP200 single-stage overhung centrifugal process pump for hot
      organic duty. Read Section 2 (Safety) in full before any work. Retain this
      manual with the equipment records for the life of the pump.
    sections:
      - number: "1"
        title: "General Description"
        paragraphs:
          - >-
            The MSC-CP200 is a single-stage, overhung, radially-split centrifugal
            process pump conforming to the general arrangement of ISO 2858 and the
            API 610 OH2 configuration. It is designed for the transfer of hot
            organic liquids at temperatures up to 220 C and differential heads up
            to 160 m. The pump is foot-mounted on a fabricated baseplate and is
            close-coupled to a standard IEC flange motor through a spacer coupling.
          - >-
            The wetted parts are supplied in carbon steel with 12% chrome
            internals as standard, with optional stainless and duplex trims for
            corrosive service. The pump uses a cartridge mechanical seal as
            standard, arranged for an API Plan 11 flush taken from pump discharge
            through a flow-control orifice back to the seal chamber.
        subsections:
          - number: "1.1"
            title: "Intended Use"
            paragraphs:
              - >-
                The pump is intended for clean to mildly contaminated hot organic
                liquids within the performance envelope stamped on the nameplate.
                Operation outside the rated flow, head, temperature or NPSH margin
                voids the warranty and will shorten seal and bearing life.
              - >-
                Typical services include column bottoms, hot ester feed and
                product transfer, and hot resin blend transfer. The pump is not
                suitable for slurries, abrasive service or liquids containing
                significant solids without a purpose-selected trim and seal plan.
          - number: "1.2"
            title: "Nameplate and Identification"
            paragraphs:
              - >-
                Each pump carries a stainless nameplate stating model, serial
                number, rated duty point, maximum working pressure and test
                pressure. Always quote the serial number when ordering spares.
          - number: "1.3"
            title: "Construction"
            paragraphs:
              - >-
                The pump is of back pull-out construction: the bearing housing,
                shaft, impeller and seal can be withdrawn from the rear of the
                casing without disturbing the casing or the connected pipework.
                This shortens seal and bearing maintenance and is the basis of the
                cartridge seal replacement procedure in Section 5.3.
              - >-
                The casing is centreline-supported for hot service so that thermal
                growth is symmetrical about the shaft, preserving alignment as the
                pump heats to operating temperature. The impeller is keyed and
                threaded to the shaft and locked against the operating direction
                of rotation.
          - number: "1.4"
            title: "Performance Range"
            paragraphs:
              - >-
                The MSC-CP200 frame covers flows to 220 m3/h and differential
                heads to 160 m at the maximum trim. Each pump is supplied trimmed
                to its specific duty; the as-built performance curve is issued
                with the pump data sheet. Prolonged operation far from the best
                efficiency point increases radial load, vibration and seal and
                bearing wear.
      - number: "2"
        title: "Safety"
        paragraphs:
          - >-
            Hot organic liquids present burn, fire and toxic-exposure hazards.
            Before any maintenance the pump must be isolated, de-pressurised,
            drained, cooled below 45 C and locked out in accordance with the site
            LOTO procedure. Confirm zero energy before breaking any joint.
          - >-
            Never run the pump dry or against a closed discharge for more than a
            few seconds. Never operate with guards removed. Personal protective
            equipment appropriate to the pumped fluid must be worn at all times.
        subsections:
          - number: "2.1"
            title: "Residual Hazards"
            paragraphs:
              - >-
                Even after isolation, trapped liquid may remain in the casing and
                seal chamber and may be hot or under pressure. Slacken joints
                gradually and stand clear of the parting line.
          - number: "2.2"
            title: "Personal Protective Equipment"
            paragraphs:
              - >-
                As a minimum, wear safety glasses with side shields, chemical-
                resistant gloves rated for the pumped fluid, and heat-resistant
                gloves when the pump may be hot. Face shield and apron are
                required when breaking joints on hot organic service. Consult the
                product safety data sheet for fluid-specific requirements.
          - number: "2.3"
            title: "Fire and Emergency"
            paragraphs:
              - >-
                Hot organic liquids may be above their flash point. In the event
                of a seal or joint release, stop the pump, isolate at the nearest
                accessible valves, and follow the site emergency procedure. Do not
                attempt to tighten joints on a pump under pressure and at
                temperature.
          - number: "2.4"
            title: "Noise"
            paragraphs:
              - >-
                Sound pressure levels near the pump and driver can exceed 85
                dB(A). Hearing protection is required in designated areas.
                Abnormal noise (cavitation crackle, bearing rumble) is also a
                diagnostic signal and must be reported, not merely tolerated.
      - number: "3"
        title: "Installation"
        paragraphs:
          - >-
            Install the pump on a rigid, level foundation. Grout the baseplate
            fully to avoid a soft-foot condition, which is a common source of
            vibration and premature seal and bearing failure. Check that no more
            than 0.05 mm soft foot exists at each mounting foot.
          - >-
            Pipework must be independently supported so that no piping loads are
            transmitted to the pump nozzles. Excessive nozzle loads distort the
            casing and cause internal rubbing and seal misalignment.
        subsections:
          - number: "3.1"
            title: "Coupling Alignment"
            paragraphs:
              - >-
                Align the pump and motor shafts by reverse-dial or laser method
                to within 0.05 mm parallel and 0.05 mm/100 mm angular, cold, with
                the coupling spacer removed. Re-check alignment hot after the
                first run, as thermal growth on hot organic duty is significant.
          - number: "3.2"
            title: "Seal Flush Piping"
            paragraphs:
              - >-
                The standard seal arrangement is an API Plan 11 flush: a line from
                the pump discharge through a flow-control orifice to the seal
                chamber, ensuring positive flush flow across the seal faces and
                venting of vapour. The flush orifice size is stamped on the seal
                cartridge and listed in Section 7. Do NOT substitute a different
                flush plan (for example                 a bypass "Plan Y" arrangement) without
                OEM approval — inadequate flush is the leading cause of seal-face
                distress and leakage on this pump. Verify the installed flush plan
                against this manual at commissioning and after any seal work.
          - number: "3.3"
            title: "Baseplate and Grouting"
            paragraphs:
              - >-
                The baseplate must be fully grouted with a non-shrink grout, with
                all voids filled, to provide a rigid, continuous support. A
                partially grouted or hollow baseplate behaves as a soft foot and
                is a persistent source of vibration. After grouting has cured,
                re-check that each foot sits flat with no more than 0.05 mm gap
                before final bolt-up.
          - number: "3.4"
            title: "Suction Piping and NPSH"
            paragraphs:
              - >-
                Design the suction line short and direct, with a steady rise to
                the pump and no high points that can trap vapour. Provide the NPSH
                margin stated on the data sheet; hot organic liquids are often
                near their bubble point and are unforgiving of suction losses. A
                fouled suction strainer or an undersized suction line will induce
                cavitation, unstable flow and impeller erosion.
              - >-
                A temporary conical suction strainer is recommended for
                commissioning to protect the pump from construction debris. Remove
                or replace it once the system is clean; a neglected strainer is a
                common cause of gradual flow loss.
      - number: "4"
        title: "Operation"
        paragraphs:
          - >-
            Prime the pump and open the seal flush before starting. Start against
            a nearly closed discharge and open the discharge valve promptly to
            reach the rated operating region. Do not run below the minimum
            continuous stable flow stamped on the nameplate.
          - >-
            Monitor bearing housing temperature, seal chamber temperature, flush
            flow and vibration during operation. A rising seal chamber
            temperature or falling flush flow indicates a flush restriction and
            must be investigated before the seal is damaged.
        subsections:
          - number: "4.1"
            title: "Normal Operating Limits"
            paragraphs:
              - >-
                Bearing housing temperature should not exceed 85 C. Overall
                vibration should remain below 4.5 mm/s RMS. Seal flush flow must
                remain within the range on the seal data sheet at all times.
          - number: "4.2"
            title: "Start-up"
            paragraphs:
              - >-
                Confirm the pump is primed and the suction valve is fully open.
                Open the seal flush and confirm flush flow before starting. Start
                the driver against a nearly closed discharge valve, then open the
                discharge promptly to bring the pump into its operating region.
                Do not run against a closed discharge for more than a few seconds
                as the liquid will overheat and flash.
          - number: "4.3"
            title: "Shutdown"
            paragraphs:
              - >-
                Close the discharge valve slowly and stop the driver. Keep the
                seal flush in service until the seal chamber has cooled. For hot
                organic service, allow the pump to cool gradually before draining
                to avoid thermal shock and to protect the seal faces.
          - number: "4.4"
            title: "Routine Monitoring"
            paragraphs:
              - >-
                On each operator round, record bearing housing temperature, seal
                chamber temperature, flush flow indication, discharge pressure and
                overall vibration. Trend these readings; a slow rise in seal
                chamber temperature or a fall in flush flow is an early indicator
                of a developing flush restriction and should be actioned before
                the seal is damaged. Report any external leakage at the gland
                immediately.
          - number: "4.5"
            title: "Minimum Flow and Parallel Operation"
            paragraphs:
              - >-
                Do not operate continuously below the minimum continuous stable
                flow on the data sheet; low-flow operation raises temperature,
                radial load and internal recirculation. When two sisters run in
                parallel, confirm both are sharing load and neither is running
                back on its curve near shut-off.
      - number: "5"
        title: "Maintenance"
        paragraphs:
          - >-
            Maintenance intervals are given in Section 5.1. The single most
            important maintenance item on hot organic duty is the mechanical seal
            and its flush system. The cartridge seal replacement procedure is
            given in full in Section 5.3.
        subsections:
          - number: "5.1"
            title: "Maintenance Schedule"
            paragraphs:
              - >-
                Weekly: check bearing and seal chamber temperature, vibration,
                flush flow and for any external leakage. Monthly: check coupling
                condition and alignment indication. Annually: inspect bearings,
                renew lubricant, inspect the seal and verify the flush orifice and
                flush plan against this manual.
          - number: "5.2"
            title: "Bearing Lubrication"
            paragraphs:
              - >-
                Bearings are grease-lubricated as standard. Use only the specified
                grade. Over-greasing causes overheating; contamination or water
                ingress degrades the lubricant and accelerates bearing wear.
          - number: "5.3"
            title: "Seal Cartridge Replacement Procedure"
            paragraphs:
              - >-
                The MSC-CP200 uses a self-contained cartridge mechanical seal to
                make replacement fast and repeatable. Follow the numbered steps
                below. Cleanliness of the seal faces and correct flush restoration
                are critical to seal life.
            steps:
              - "Isolate, de-pressurise, drain and cool the pump; apply LOTO and confirm zero energy (see Section 2 and the site LOTO SOP)."
              - "Disconnect and remove the coupling spacer; do not disturb the alignment shims."
              - "Disconnect the seal flush piping at the seal chamber and cap the lines to keep them clean."
              - "Remove the bearing housing / back pull-out assembly from the casing, leaving the casing and pipework in place."
              - "Release the cartridge clamping ring set-screws and withdraw the spent cartridge seal from the shaft as a complete unit."
              - "Clean the shaft and seal chamber faces; inspect the shaft sleeve seat for scoring or fretting and renew if damaged."
              - "Fit the new cartridge seal, ensuring the setting clips are in place; do NOT remove the clips until the assembly is complete."
              - "Reassemble the back pull-out into the casing; torque the casing bolts evenly to the values in Section 7."
              - "Tighten the cartridge drive collar, then remove and retain the seal setting clips."
              - "Reconnect the seal flush piping. Verify the flush plan is OEM Plan 11 and the flush orifice is the correct size — do not leave a substitute flush arrangement in service."
              - "Refit the coupling spacer and re-check alignment; correct if disturbed."
              - "Remove LOTO, restore the flush, prime, and start the pump. Confirm positive flush flow and no leakage before returning to service."
          - number: "5.4"
            title: "Bearing Replacement"
            paragraphs:
              - >-
                Renew bearings at the scheduled interval or when condition
                monitoring indicates wear (rising vibration, noise or bearing
                housing temperature). Cleanliness is essential; a single hard
                particle will destroy a new bearing.
            steps:
              - "Isolate, drain, cool and apply LOTO as for seal work (Section 5.3, steps 1-2)."
              - "Remove the back pull-out assembly and, if fitted, the cartridge seal."
              - "Record the existing shim pack; remove the bearing end cover and lock-nut."
              - "Withdraw the shaft from the bearing housing and remove the old bearings with a proper puller — never hammer."
              - "Clean the shaft and housing; inspect the shaft seats and housing bore for damage."
              - "Heat the new bearings inductively to the recommended temperature and fit them square to the shoulder; do not exceed the maximum bearing temperature."
              - "Reassemble with the recorded shim pack; set and check the end float."
              - "Re-lubricate with the correct grade and quantity; do not over-grease."
              - "Reassemble the back pull-out and return the pump to service per Section 5.3."
          - number: "5.5"
            title: "Seal Flush System Maintenance"
            paragraphs:
              - >-
                The API Plan 11 flush is the seal's lifeline on hot organic duty
                and is the single most important item to keep in specification.
                The flush takes a controlled bleed from the pump discharge,
                through a flow orifice, into the seal chamber, cooling and
                lubricating the faces and sweeping away vapour.
              - >-
                At every seal inspection, confirm the flush line is clear, the
                orifice is the correct size and not eroded or plugged, and any
                flush strainer is clean. Confirm the flush arrangement is the
                OEM-specified Plan 11 and has not been altered in the field to a
                non-standard "Plan Y" bypass. A restricted or non-standard flush
                starves the faces, drives them hot, and produces the scored faces
                and gland weeping that precede a full seal failure.
              - >-
                If repeated seal failures occur across sister pumps in the same
                service, treat the flush system as the prime suspect and audit the
                flush plan on every sister against this manual before renewing
                further seals. Renewing a seal without correcting an inadequate
                flush simply repeats the failure.
          - number: "5.6"
            title: "Fault Diagnosis Approach"
            paragraphs:
              - >-
                Diagnose from evidence, not assumption. Distinguish leakage faults
                (seal, flush, gasket) from vibration faults (misalignment,
                cavitation, bearing, soft foot) using the symptom, the flush and
                temperature trends, and vibration data. The troubleshooting table
                in Section 6 maps common symptoms to their probable causes and the
                correct first action.
      - number: "6"
        title: "Troubleshooting"
        paragraphs:
          - >-
            The table below lists common symptoms, their probable causes and the
            recommended action. For seal leakage, always verify the seal flush
            plan and flush line against Section 3.2 before renewing the seal —
            renewing a seal without correcting an inadequate flush will only
            repeat the failure.
        # Rendered as the Section 6 symptom/cause/action table.
        troubleshooting:
          - symptom: "Seal leakage; product weeping or dripping at gland"
            cause: "Inadequate seal flush — flush line blocked or non-OEM flush plan (e.g. Plan Y); worn or scored faces"
            action: "Verify seal flush plan against OEM Plan 11 (Section 3.2); inspect and clear flush line/orifice/strainer; renew cartridge seal if faces damaged"
          - symptom: "Seal chamber temperature rising; flush flow low"
            cause: "Flush line restriction, fouled orifice or blocked strainer"
            action: "Inspect and clean the flush line and orifice; confirm flush flow to seal data sheet"
          - symptom: "High vibration"
            cause: "Shaft misalignment, cavitation, or soft foot"
            action: "Check coupling alignment (laser) and correct; verify NPSH margin against cavitation; check hold-down bolts / soft foot"
          - symptom: "Crackling / gravel noise, unstable flow"
            cause: "Cavitation from insufficient NPSH or suction restriction"
            action: "Restore suction conditions; clean suction strainer; confirm NPSH available exceeds required"
          - symptom: "Bearing noise / high bearing temperature"
            cause: "Bearing wear, lubrication degradation or over-greasing"
            action: "Renew bearings; use correct lubricant grade and quantity"
          - symptom: "Low developed head / flow"
            cause: "Impeller wear or damage, or worn wear rings"
            action: "Inspect and renew impeller and wear rings; reset clearances"
          - symptom: "Loss of drive / sudden vibration"
            cause: "Coupling element failure"
            action: "Renew coupling element and bolts; re-check alignment"
      - number: "7"
        title: "Spare Parts"
        paragraphs:
          - >-
            The recommended spares for the MSC-CP200 are listed below. Always
            quote the pump serial number and the part number when ordering. The
            cartridge seal and the flush orifice are the critical spares for hot
            organic duty and should be held in stock for each installed pump.
        # Rendered as the Section 7 parts table.
        parts:
          - {item: "Cartridge mechanical seal", part_no: "RW-CP200-SEAL-C", material: "SiC/Carbon, Viton", qty: "1"}
          - {item: "Seal flush orifice (Plan 11)", part_no: "RW-CP200-ORF-3.0", material: "SS316", qty: "1"}
          - {item: "Impeller", part_no: "RW-CP200-IMP", material: "12% Cr", qty: "1"}
          - {item: "Wear ring set", part_no: "RW-CP200-WR", material: "12% Cr", qty: "1 set"}
          - {item: "Drive-end bearing", part_no: "RW-CP200-BRG-DE", material: "-", qty: "1"}
          - {item: "Non-drive-end bearing", part_no: "RW-CP200-BRG-NDE", material: "-", qty: "1"}
          - {item: "Shaft sleeve", part_no: "RW-CP200-SLV", material: "SS316", qty: "1"}
          - {item: "Casing gasket set", part_no: "RW-CP200-GKT", material: "Graphite", qty: "1 set"}
          - {item: "Coupling element", part_no: "RW-CP200-CPL-EL", material: "Elastomer", qty: "1"}
          - {item: "Bearing housing oil seal", part_no: "RW-CP200-OS", material: "Viton", qty: "2"}
          - {item: "Casing wear ring", part_no: "RW-CP200-CWR", material: "12% Cr", qty: "1"}
          - {item: "Impeller wear ring", part_no: "RW-CP200-IWR", material: "12% Cr", qty: "1"}
          - {item: "Shaft key", part_no: "RW-CP200-KEY", material: "SS316", qty: "1"}
          - {item: "Bearing lock-nut and washer", part_no: "RW-CP200-LN", material: "Steel", qty: "1 set"}
          - {item: "Seal chamber gasket", part_no: "RW-CP200-SCG", material: "Graphite", qty: "1"}
          - {item: "Deflector", part_no: "RW-CP200-DEF", material: "NBR", qty: "1"}
          - {item: "Casing drain plug", part_no: "RW-CP200-DP", material: "SS316", qty: "1"}
          - {item: "Flush line tubing kit", part_no: "RW-CP200-FLK", material: "SS316", qty: "1 set"}
        # Rendered as the Section 7 fastener torque table.
        torques:
          - {fastener: "Casing bolts M16", value: "210 Nm"}
          - {fastener: "Bearing housing bolts M12", value: "85 Nm"}
          - {fastener: "Coupling hub set-screw", value: "35 Nm"}
          - {fastener: "Cartridge drive collar", value: "12 Nm"}
      - number: "8"
        title: "Technical Data"
        paragraphs:
          - >-
            Nominal technical data for the MSC-CP200 frame is given below. The
            duty-specific values are on the nameplate and the pump data sheet.
        technical_data:
          - {parameter: "Configuration", value: "Single-stage overhung, OH2"}
          - {parameter: "Max flow", value: "220 m3/h"}
          - {parameter: "Max differential head", value: "160 m"}
          - {parameter: "Max working temperature", value: "220 C"}
          - {parameter: "Max working pressure", value: "25 bar(g)"}
          - {parameter: "Seal type", value: "Cartridge mechanical, API Plan 11"}
          - {parameter: "Bearing lubrication", value: "Grease (standard)"}
          - {parameter: "Bearing temp alarm", value: "85 C"}
          - {parameter: "Vibration alarm", value: "4.5 mm/s RMS"}
          - {parameter: "Coupling", value: "Spacer, flexible element"}

  # 10 SOPs. Tier-1 (hero-related) get full step numbering; the rest are thin.
  # scanned_page: true renders ONE page as an image (the honest OCR demo page).
  sops:
    - id: SOP-001
      title: "Pump Isolation & Mechanical Seal Replacement (CP200)"
      owner_class: CP200
      tier: 1
      purpose: >-
        To safely isolate an MSC-CP200 pump and replace the cartridge mechanical
        seal, restoring the OEM-specified seal flush plan.
      steps:
        - "Obtain a work permit and confirm the pump is scheduled out of service."
        - "Stop the pump locally and verify no rotation."
        - "Close suction and discharge isolation valves; tag them shut."
        - "Isolate the motor electrically and apply LOTO per SOP-003; confirm zero energy."
        - "De-pressurise and drain the pump to the closed drain; allow to cool below 45 C."
        - "Disconnect and cap the seal flush piping."
        - "Follow the OEM cartridge seal replacement procedure (MSC-CP200 manual Section 5.3)."
        - "On reassembly, verify the seal flush plan is OEM Plan 11 with the correct orifice — do not leave a substitute flush plan in service."
        - "Re-check coupling alignment before removing LOTO."
        - "Restore flush, remove LOTO and isolations, prime and restart; confirm no leakage and positive flush flow."
      scanned_page: true
    - id: SOP-002
      title: "Hot Work Permit Procedure"
      owner_class: null
      tier: 1
      purpose: >-
        To control ignition sources during welding, grinding or cutting in
        process areas.
      steps:
        - "Identify the hot-work location and surrounding hazards."
        - "Obtain a hot-work permit signed by the area authority."
        - "Gas-test the area; confirm below 10% LEL before starting and periodically during work."
        - "Remove or cover combustibles within 15 m; provide a fire watch and extinguisher."
        - "Isolate and blind any connected process lines."
        - "Perform the work; maintain the fire watch for 30 minutes after completion."
        - "Close out the permit and confirm the area is safe."
    - id: SOP-003
      title: "Lockout / Tagout (LOTO) Procedure"
      owner_class: null
      tier: 1
      purpose: >-
        To ensure equipment is isolated from all energy sources before
        maintenance.
      steps:
        - "Identify all energy sources for the equipment (electrical, mechanical, hydraulic, thermal, stored)."
        - "Notify affected personnel of the shutdown."
        - "Shut down the equipment using normal stopping procedure."
        - "Isolate each energy source at the disconnecting means."
        - "Apply an individual lock and tag to each isolation point."
        - "Release or restrain stored energy (pressure, springs, thermal)."
        - "Verify isolation by attempting a normal start (try-out); confirm zero energy."
        - "Carry out the maintenance work."
        - "On completion, remove tools, replace guards, and remove locks/tags only by the person who applied them."
        - "Notify affected personnel before re-energising."
    - id: SOP-004
      title: "Bearing Lubrication Routine"
      owner_class: null
      tier: 3
      purpose: "Routine greasing of rotating equipment bearings."
      steps:
        - "Confirm the correct grease grade and quantity for the bearing."
        - "Clean the grease nipple and apply the specified quantity."
        - "Record the lubrication in the PM log."
    - id: SOP-005
      title: "Vibration Data Collection Routine"
      owner_class: null
      tier: 3
      purpose: "Routine collection of vibration readings on rotating equipment."
      steps:
        - "Collect overall vibration at the defined measurement points."
        - "Compare against alarm limits and log the readings."
        - "Raise a work order if any point exceeds the alarm limit."
    - id: SOP-006
      title: "Control Valve Calibration Routine"
      owner_class: CV
      tier: 3
      purpose: "Routine stroke and calibration check of control valves."
      steps:
        - "Place the loop in manual and notify the control room."
        - "Stroke the valve 0-50-100% and verify positioner response."
        - "Calibrate as required and return the loop to auto."
    - id: SOP-007
      title: "Heat Exchanger Cleaning Routine"
      owner_class: HEX
      tier: 3
      purpose: "Isolation and cleaning of shell-and-tube exchangers."
      steps:
        - "Isolate and drain both shell and tube sides."
        - "Open the exchanger and clean the tubes."
        - "Reassemble with new gaskets and leak-test."
    - id: SOP-008
      title: "Tank Gauging and Inspection Routine"
      owner_class: TK
      tier: 3
      purpose: "Routine gauging and external inspection of storage tanks."
      steps:
        - "Record tank level and temperature."
        - "Inspect the shell and roof externally for corrosion or leaks."
        - "Log findings and raise a work order for any defect."
    - id: SOP-009
      title: "Motor Insulation Resistance Test Routine"
      owner_class: MOT
      tier: 3
      purpose: "Routine IR testing of electric motors."
      steps:
        - "Isolate and lock out the motor per SOP-003."
        - "Measure insulation resistance with a megger."
        - "Log the reading and flag any value below 1 Mohm."
    - id: SOP-010
      title: "Compressor Routine Check"
      owner_class: COMP
      tier: 3
      purpose: "Routine checks on rotary screw compressors."
      steps:
        - "Check oil level, discharge temperature and pressure."
        - "Drain condensate and check for abnormal noise or vibration."
        - "Log the readings."

