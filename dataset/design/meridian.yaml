# =============================================================================
# MERIDIAN SPECIALTY CHEMICALS — RELATIONAL TRUTH (P10)
# =============================================================================
# This file is the single source of truth for the seeded plant. Every rendered
# document (manual, SOPs, reports, registry CSVs) is a deterministic rendering
# of the facts declared here. No fact may appear in a document that is absent
# from this file.
#
# Ground truth vs. database:
#   - `true_failure_mode` on work orders is GROUND TRUTH for the M3 normalization
#     audit. It is NEVER written to Postgres. Only raw text reaches the DB; the
#     system must *discover* the failure mode itself.
#   - The ~500 work orders are a mix of hard-authored WOs (the planted pattern +
#     history depth + red herrings) and deterministically generated noise. The
#     generator (render_wo.py) expands the `work_order_generation` spec below
#     using only phrasings/facts declared in this file, so P10 still holds: every
#     phrase a technician "wrote" is authored here, in `phrase_bank`.
#
# Money is INR (₹), temperatures Celsius, pressures bar(g) / kg/cm² — an Indian
# specialty-chemicals plant. Tag conventions: P-xxxx pumps, M-xxxx motors,
# E-xxxx exchangers, A-xxxx agitators, C-xxxx compressors, CV-xxxx control
# valves, TK-xxxx tanks. First digit of the numeric block = unit.
# =============================================================================

# -----------------------------------------------------------------------------
# PLANTS & UNITS
# -----------------------------------------------------------------------------
