# -----------------------------------------------------------------------------
# FAILURE MODES (~25, ISO 14224-flavoured).
# The `description` is the text M3 embeds for normalization — plain engineering
# language, one dense sentence each. `code` is the normalized label.
# `family` groups phenomenologically adjacent modes (D-017): the normalization
# margin gate is a CROSS-family confusion guard only — within a family, near-ties
# are expected (adjacent modes) and the best score wins. Family assignment is a
# curation judgment, human-ratified (see M3.2 report).
# -----------------------------------------------------------------------------
failure_modes:
  - code: mechanical_seal_leakage
    family: sealing
    name: Mechanical seal leakage
    description: >-
      Loss of process fluid past the mechanical seal faces or gland, seen as
      weeping, dripping or product on the baseplate, from worn, scored or
      improperly flushed seal faces. Often reported as seal weeping, dripping at
      the gland or gland follower, product on the baseplate, scored or worn seal
      faces, or a failed/replaced seal cartridge.
  - code: seal_flush_line_blockage
    family: sealing
    name: Seal flush line blockage
    description: >-
      Restriction or fouling of the seal flush line, orifice or strainer that
      starves the seal faces of cooling and lubrication flow and drives them to
      run hot and fail. Often reported as flush line choked, low flush flow,
      dirty strainer, blocked orifice, or running non-standard flush plan Y
      instead of OEM Plan 11.
  - code: gland_packing_leakage
    family: sealing
    name: Gland packing leakage
    description: >-
      Excessive leakage past compression gland packing due to worn rings or lost
      adjustment on packed (non-mechanical-seal) equipment. Often reported as
      gland packing dripping, weeping past the gland follower, or packing
      retightened with leakage persisting.
  - code: bearing_wear
    family: tribology
    name: Bearing wear
    description: >-
      Progressive degradation of rolling-element bearings producing rising
      vibration, audible noise and elevated bearing housing temperature. Often
      reported as bearing noisy DE/NDE side, elevated vibration, rumbling, or
      bearing housing temperature rising.
  - code: bearing_seizure
    family: tribology
    name: Bearing seizure
    description: >-
      Sudden loss of bearing function from loss of lubrication or contamination,
      causing the shaft to bind, overheat or stop. Often reported as pump
      stopped, shaft locked or won't turn, bearing seized, hot with burnt smell,
      or no grease.
  - code: shaft_misalignment
    family: alignment
    name: Shaft misalignment
    description: >-
      Angular or parallel misalignment between driver and driven shaft coupling
      that raises vibration and loads bearings and seals beyond design. Often
      reported as coupling wear, vibration at 2x running speed, soft foot, or
      laser alignment out of tolerance.
  - code: cavitation
    family: hydraulic
    name: Cavitation
    description: >-
      Vapour-bubble formation and collapse in the pump from insufficient NPSH,
      producing crackling noise, unstable flow and impeller surface erosion.
      Often reported as pump crackling, gravel-like noise, flow swinging,
      suction low, or NPSH inadequate.
  - code: impeller_damage
    family: hydraulic
    name: Impeller damage
    description: >-
      Mechanical damage to the impeller — cracked or broken vanes, wear-ring
      contact or foreign-object strike — reducing head and flow. Often reported
      as no head from pump, impeller vane broken or cracked, foreign object
      inside, or casing opened to find damage.
  - code: impeller_wear
    family: hydraulic
    name: Impeller wear
    description: >-
      Gradual erosion of impeller vanes and wear rings from abrasive or
      high-velocity service, causing slow loss of developed head over time.
      Often reported as head dropping slowly, impeller vanes eroded, wear rings
      worn, clearances open, or performance down.
  - code: coupling_failure
    family: alignment
    name: Coupling failure
    description: >-
      Failure of the flexible coupling element, spacer or bolts transmitting
      torque between driver and pump, causing vibration or loss of drive. Often
      reported as coupling element torn, rubber element broken, no drive, or
      spacer replaced.
  - code: motor_winding_overheating
    family: electrical
    name: Motor winding overheating
    description: >-
      Overheating of motor stator windings from overload, phase imbalance or
      cooling loss, tripping on thermal protection and degrading insulation.
      Often reported as motor tripped on overload, winding hot with smell, or
      phase currents imbalanced.
  - code: motor_bearing_failure
    family: tribology
    name: Motor bearing failure
    description: >-
      Degradation or failure of the motor's own drive- or non-drive-end
      bearings, producing motor-side vibration and noise. Often reported as
      motor NDE/DE bearing noisy, vibration on motor side, or motor bearings
      replaced.
  - code: electrical_insulation_fault
    family: electrical
    name: Electrical insulation fault
    description: >-
      Breakdown of winding or cable insulation seen as low insulation
      resistance, earth fault or tripping of electrical protection. Often
      reported as megger/IR low, earth fault, motor isolated, or insulation
      resistance below threshold.
  - code: lubrication_degradation
    family: tribology
    name: Lubrication degradation
    description: >-
      Loss of lubricant condition — contamination, water ingress, wrong grade or
      low level — that accelerates bearing and gear wear. Often reported as oil
      dark, water in oil, wrong grease grade, low lube level, or contaminated
      grease.
  - code: soft_foot
    family: structural
    name: Soft foot / foundation
    description: >-
      Uneven machine footing, loose hold-down bolts or degraded grout that
      distorts the casing and induces vibration and misalignment. Often reported
      as soft foot found, hold-down bolts loose, foundation cracked, or one foot
      shimmed.
  - code: high_vibration
    family: structural
    name: High vibration (undiagnosed)
    description: >-
      Elevated overall vibration recorded on rotating equipment where the root
      cause is not yet isolated to a specific mechanical mode. Often reported as
      overall vibration high with cause not yet isolated, vibration elevated and
      trending, or monitoring continued.
  - code: instrument_drift
    family: valves_instrumentation
    name: Instrument drift
    description: >-
      Gradual deviation of a transmitter or gauge from calibrated true value,
      giving misleading process readings until recalibrated. Often reported as
      gauge/transmitter reading off vs field, xmtr drift, or recalibrated to true
      value.
  - code: control_valve_seat_leakage
    family: valves_instrumentation
    name: Control valve seat leakage
    description: >-
      Passing of a shut control valve across the seat from erosion or debris,
      preventing tight isolation and disturbing control. Often reported as CV
      passing when shut, seat eroded, passing across seat, or lapped/replaced
      trim.
  - code: control_valve_stem_sticking
    family: valves_instrumentation
    name: Control valve stem sticking
    description: >-
      Sticky or hunting valve stem travel from packing friction, actuator or
      positioner faults, degrading loop control. Often reported as valve
      sticking, hunting, packing tight, or positioner hunting.
  - code: suction_strainer_fouling
    family: hydraulic
    name: Suction strainer fouling
    description: >-
      Accumulation of debris on the pump suction strainer that starves suction,
      lowers flow and can induce cavitation. Often reported as suction strainer
      choked, flow low, high dP across strainer, or strainer cleaned.
  - code: heat_exchanger_tube_fouling
    family: heat_transfer
    name: Heat exchanger tube fouling
    description: >-
      Deposition of scale, polymer or dirt on exchanger tubes that reduces heat
      transfer and raises pressure drop and outlet temperature. Often reported as
      HX dP high, outlet temp up, poor duty, tubes fouled, or chem clean
      scheduled.
  - code: heat_exchanger_tube_leak
    family: heat_transfer
    name: Heat exchanger tube leak
    description: >-
      Loss of tube integrity allowing cross-contamination between shell and tube
      sides, detected by composition or pressure change. Often reported as cross
      contamination, tube leak on exchanger, hydrotest failure, or tube plugged.
  - code: gasket_joint_leakage
    family: integrity
    name: Gasket / joint leakage
    description: >-
      Leakage from a flanged or bonnet joint due to gasket failure, relaxation
      or improper bolt-up. Often reported as flange weeping, bonnet joint leak,
      gasket blown, or torqued after replacement.
  - code: corrosion_erosion
    family: integrity
    name: Corrosion / erosion
    description: >-
      Metal loss of casing, piping or internals from chemical attack or
      high-velocity abrasion, thinning walls over time. Often reported as wall
      thin, UT readings low, metal thinning on casing, or corrosion on pump
      casing.
  - code: tank_shell_corrosion
    family: integrity
    name: Tank shell / roof corrosion
    description: >-
      Corrosion of storage-tank shell, roof or bottom plate from product,
      condensation or atmospheric attack, threatening containment. Often reported
      as tank shell corroded, roof rusty/pitting, external or internal shell
      corrosion, or recoat planned.

# -----------------------------------------------------------------------------
# WORK-ORDER GENERATION SPEC (deterministic — render_wo.py expands this).
# `routine_ratio` of each asset's WOs are routine/ambiguous → the correct
# normalization outcome is `unclassified` (honest negatives for the audit).
# Remaining WOs draw a true_failure_mode from the class profile weights.
# -----------------------------------------------------------------------------
work_order_generation:
  first_wo_year: 2020            # generated WOs start no earlier than this
  last_wo_date: 2026-06-30
  routine_ratio: 0.12            # ~12% land in the unclassified bucket
  # Per-class weighted failure-mode distribution for GENERATED (noise) WOs.
  class_failure_profiles:
    CP200:
      mechanical_seal_leakage: 4
      bearing_wear: 3
      seal_flush_line_blockage: 2
      cavitation: 2
      shaft_misalignment: 2
      coupling_failure: 1
      lubrication_degradation: 2
      impeller_wear: 1
    CP100:
      mechanical_seal_leakage: 2
      bearing_wear: 3
      cavitation: 2
      shaft_misalignment: 2
      suction_strainer_fouling: 2
      gland_packing_leakage: 1
      coupling_failure: 1
    MOT:
      motor_bearing_failure: 3
      motor_winding_overheating: 3
      electrical_insulation_fault: 2
      lubrication_degradation: 2
      high_vibration: 1
    HEX:
      heat_exchanger_tube_fouling: 4
      heat_exchanger_tube_leak: 2
      gasket_joint_leakage: 2
      corrosion_erosion: 2
    AGI:
      mechanical_seal_leakage: 2
      bearing_wear: 3
