# -----------------------------------------------------------------------------
# ASSET CLASSES (~8). Hero class = CP200 (Rheinwerk MSC-CP200).
# `key` is the internal handle used by generators; `code` is the human short.
# -----------------------------------------------------------------------------
asset_classes:
  - key: CP200          # HERO CLASS
    manufacturer: Rheinwerk Pumps GmbH
    model: MSC-CP200
    class_name: Centrifugal process pump (hot organics duty)
    description: >-
      Single-stage overhung centrifugal process pump, ISO 2858 / API 610 OH2
      style, cartridge mechanical seal with API Plan 11 flush, rated for hot
      organic transfer up to 220 C. The plant's hero pump family.
  - key: CP100
    manufacturer: Rheinwerk Pumps GmbH
    model: MSC-CP100
    class_name: Centrifugal process pump (general service)
    description: >-
      Close-coupled general-service centrifugal pump for cool/ambient aqueous
      and light-solvent transfer, component mechanical seal, no external flush.
  - key: MOT
    manufacturer: Bharat Bijlee
    model: BB-IE3-160
    class_name: LV squirrel-cage induction motor
    description: >-
      Three-phase TEFC squirrel-cage induction motor, IE3, 415 V, driving pumps
      and agitators across both plants.
  - key: HEX
    manufacturer: Alfa Laval India
    model: AL-STX
    class_name: Shell-and-tube heat exchanger
    description: >-
      Fixed-tubesheet shell-and-tube heat exchanger for process heating and
      cooling duties, carbon-steel shell with SS316 tubes.
  - key: AGI
    manufacturer: Sulzer India
    model: SZ-TE
    class_name: Top-entry agitator
    description: >-
      Top-entry gear-driven agitator with mechanical seal, for reactor and
      blend-vessel mixing duties.
  - key: COMP
    manufacturer: Atlas Copco India
    model: GA-45
    class_name: Rotary screw air compressor
    description: >-
      Oil-injected rotary screw compressor supplying plant and instrument air.
  - key: CV
    manufacturer: Emerson Fisher
    model: EZ-globe
    class_name: Globe control valve
    description: >-
      Pneumatic-actuated globe control valve with positioner, for flow and
      temperature control loops.
  - key: TK
    manufacturer: Meridian Fabrication (in-house)
    model: AST-CS
    class_name: Atmospheric storage tank
    description: >-
      Vertical atmospheric carbon-steel storage tank, cone roof, for solvent
      and product storage in the tank farm.

